name: VS Code Extension CI

on:
  push:
    branches: [main]
    paths:
      - 'editors/vscode/**'
      - '.github/workflows/vscode-extension.yml'
  pull_request:
    branches: [main]
    paths:
      - 'editors/vscode/**'
      - '.github/workflows/vscode-extension.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: editors/vscode

jobs:
  test:
    name: Type-check & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Compile
        run: npm run compile

      - name: Run extension tests (Linux, headless via xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run extension tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm test

  package:
    name: Package .vsix (sanity check)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce
        working-directory: .

      - name: Package extension
        run: vsce package --out quicklsp-vscode.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicklsp-vscode-dev-build
          path: editors/vscode/quicklsp-vscode.vsix
          if-no-files-found: error
