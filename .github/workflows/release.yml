name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-binary:
    name: Build quicklsp (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin quicklsp

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          staging="quicklsp-${RELEASE_TAG}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/quicklsp" "$staging/"
          cp README.md "$staging/"
          tar czf "${staging}.tar.gz" "$staging"
          echo "ASSET=${staging}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="quicklsp-${RELEASE_TAG}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/quicklsp.exe" "$staging/"
          cp README.md "$staging/"
          7z a "${staging}.zip" "$staging" >/dev/null
          echo "ASSET=${staging}.zip" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicklsp-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  build-extension:
    name: Package VS Code extension (${{ matrix.vsce_target }})
    needs: build-binary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust_target: x86_64-unknown-linux-gnu
            vsce_target: linux-x64
            binary: quicklsp
            archive_glob: '*.tar.gz'
          - rust_target: aarch64-unknown-linux-gnu
            vsce_target: linux-arm64
            binary: quicklsp
            archive_glob: '*.tar.gz'
          - rust_target: x86_64-apple-darwin
            vsce_target: darwin-x64
            binary: quicklsp
            archive_glob: '*.tar.gz'
          - rust_target: aarch64-apple-darwin
            vsce_target: darwin-arm64
            binary: quicklsp
            archive_glob: '*.tar.gz'
          - rust_target: x86_64-pc-windows-msvc
            vsce_target: win32-x64
            binary: quicklsp.exe
            archive_glob: '*.zip'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Type-check
        working-directory: editors/vscode
        run: npm run type-check

      - name: Compile
        working-directory: editors/vscode
        run: npm run compile

      - name: Download matching quicklsp binary artifact
        uses: actions/download-artifact@v4
        with:
          name: quicklsp-${{ matrix.rust_target }}
          path: /tmp/quicklsp-binary

      - name: Extract binary into editors/vscode/server
        shell: bash
        run: |
          mkdir -p /tmp/quicklsp-extracted
          archive=$(find /tmp/quicklsp-binary -type f -name '${{ matrix.archive_glob }}' | head -n1)
          echo "Using archive: $archive"
          case "$archive" in
            *.tar.gz) tar -xzf "$archive" -C /tmp/quicklsp-extracted ;;
            *.zip)    unzip -q "$archive" -d /tmp/quicklsp-extracted ;;
            *) echo "unexpected archive: $archive"; exit 1 ;;
          esac
          mkdir -p editors/vscode/server
          found=$(find /tmp/quicklsp-extracted -type f -name '${{ matrix.binary }}' | head -n1)
          if [ -z "$found" ]; then
            echo "Could not locate ${{ matrix.binary }} inside archive"
            find /tmp/quicklsp-extracted
            exit 1
          fi
          cp "$found" "editors/vscode/server/${{ matrix.binary }}"
          chmod +x "editors/vscode/server/${{ matrix.binary }}" || true
          ls -la editors/vscode/server

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package platform-specific .vsix
        working-directory: editors/vscode
        run: |
          vsce package \
            --target ${{ matrix.vsce_target }} \
            --out "quicklsp-vscode-${RELEASE_TAG}-${{ matrix.vsce_target }}.vsix"

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: quicklsp-vscode-${{ matrix.vsce_target }}
          path: editors/vscode/quicklsp-vscode-*.vsix
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: [build-binary, build-extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.vsix' \) -exec cp {} assets/ \;
          ls -la assets

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: assets/*
          fail_on_unmatched_files: true
